name: Swift Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Show toolchain
        run: swift --version

      - name: Validate shell scripts
        run: bash -n scripts/build_app.sh scripts/package_release.sh scripts/notarize_app.sh scripts/release_notarized.sh

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release

      - name: Verify app bundle packaging
        run: ./scripts/build_app.sh
